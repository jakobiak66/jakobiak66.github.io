name: Deploy All 13 Websites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # PHASE 1: Alle 13 Websites parallel bauen
  # ─────────────────────────────────────────────
  build:
    name: "Build: ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # Alle anderen bauen weiter, auch wenn einer scheitert
      matrix:
        include:
          # ── Typ A: Standard Vite + React (react-router-dom) ──
          - project: haustechnik-hun
            path: fertig/haustechnik-hun/website
            firma: "Haustechnik Hun"
            branche: "SHK"

          - project: heizung-sanitaer-adamek
            path: fertig/heizung-sanitaer-adamek/website
            firma: "Heizung Sanitär Adamek"
            branche: "SHK+Solar"

          - project: shk-rathmann
            path: fertig/shk-rathmann/website
            firma: "SHK Rathmann"
            branche: "SHK"

          - project: susanneheitmann
            path: fertig/susanneheitmann/website
            firma: "Susanne Heitmann"
            branche: "Coaching"

          - project: fahrschulekolb
            path: fertig/fahrschulekolb/website
            firma: "Fahrschule Kolb"
            branche: "Fahrschule"

          - project: yoga-kendra
            path: fertig/yoga-kendra/website
            firma: "Yoga Kendra"
            branche: "Yoga"

          - project: sehrfit
            path: fertig/sehrfit/website
            firma: "SEHRFIT"
            branche: "Fitness"

          - project: fahrschule-salman
            path: fertig/fahrschule-salman/website
            firma: "Fahrschule Salman"
            branche: "Fahrschule"

          - project: fat-daddys-tattoo
            path: fertig/fat-daddys-tattoo/website
            firma: "Fat Daddys Backyard"
            branche: "Tattoo"

          - project: fahrschule-frank-dopf
            path: fertig/fahrschule-frank-dopf/website
            firma: "Fahrschule Frank Dopf"
            branche: "Fahrschule"

          # ── Typ B: TanStack Router/Start ──
          - project: christ-berlin
            path: fertig/christ-berlin/website
            firma: "Alexander Christ GmbH"
            branche: "Gebäudetechnik"

          - project: swa-berlin
            path: fertig/swa-berlin/website
            firma: "SWA Berlin GmbH"
            branche: "TGA"

          - project: goldschmiede-cifci
            path: fertig/goldschmiede-cifci/website
            firma: "Goldschmiede Cifci"
            branche: "Goldschmiede"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install
        working-directory: ${{ matrix.path }}

      - name: Build Website
        run: npm run build -- --base=/${{ matrix.project }}/
        working-directory: ${{ matrix.path }}
        env:
          NODE_ENV: production

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.project }}
          path: ${{ matrix.path }}/dist
          retention-days: 1

  # ─────────────────────────────────────────────
  # PHASE 2: Alle Builds zusammenführen & deployen
  # ─────────────────────────────────────────────
  assemble-and-deploy:
    name: "Assemble & Deploy to GitHub Pages"
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble Final Output
        run: |
          mkdir -p dist

          # Landing-Page kopieren
          cp fertig/alle_websites_deploy/index.html dist/index.html

          # Jede Website in ihr Unterverzeichnis kopieren
          PROJECTS=(
            haustechnik-hun
            heizung-sanitaer-adamek
            shk-rathmann
            susanneheitmann
            fahrschulekolb
            yoga-kendra
            sehrfit
            fahrschule-salman
            fat-daddys-tattoo
            fahrschule-frank-dopf
            christ-berlin
            swa-berlin
            goldschmiede-cifci
          )

          for proj in "${PROJECTS[@]}"; do
            artifact_dir="artifacts/dist-${proj}"
            if [ -d "$artifact_dir" ]; then
              mkdir -p "dist/${proj}"
              cp -r "${artifact_dir}/." "dist/${proj}/"
              echo "✅ Assembled: ${proj}"
            else
              echo "⚠️  WARNING: No artifact found for ${proj}"
            fi
          done

          echo ""
          echo "📁 Final dist/ structure:"
          ls -la dist/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
