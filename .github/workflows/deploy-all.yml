name: Deploy All 13 Websites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # Alle 13 Websites parallel bauen
  # (alle jetzt standard Vite+React+react-router-dom)
  # ─────────────────────────────────────────────
  build:
    name: "Build: ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: haustechnik-hun,         path: fertig/haustechnik-hun/website }
          - { project: heizung-sanitaer-adamek, path: fertig/heizung-sanitaer-adamek/website }
          - { project: shk-rathmann,            path: fertig/shk-rathmann/website }
          - { project: susanneheitmann,         path: fertig/susanneheitmann/website }
          - { project: fahrschulekolb,          path: fertig/fahrschulekolb/website }
          - { project: yoga-kendra,             path: fertig/yoga-kendra/website }
          - { project: sehrfit,                 path: fertig/sehrfit/website }
          - { project: fahrschule-salman,       path: fertig/fahrschule-salman/website }
          - { project: fat-daddys-tattoo,       path: fertig/fat-daddys-tattoo/website }
          - { project: fahrschule-frank-dopf,   path: fertig/fahrschule-frank-dopf/website }
          - { project: christ-berlin,           path: fertig/christ-berlin/website }
          - { project: swa-berlin,              path: fertig/swa-berlin/website }
          - { project: goldschmiede-cifci,      path: fertig/goldschmiede-cifci/website }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install
        working-directory: ${{ matrix.path }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.path }}

      - name: Verify dist/index.html
        run: |
          if [ -f "dist/index.html" ]; then
            echo "✅ Build OK – $(find dist -type f | wc -l) Dateien"
          else
            echo "❌ dist/index.html fehlt!"
            ls -la dist/ 2>/dev/null || echo "dist/ existiert nicht"
            exit 1
          fi
        working-directory: ${{ matrix.path }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.project }}
          path: ${{ matrix.path }}/dist
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────
  # Alles zusammenführen und auf GitHub Pages deployen
  # ─────────────────────────────────────────────
  assemble-and-deploy:
    name: "Assemble & Deploy"
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble dist/
        run: |
          mkdir -p dist
          cp fertig/alle_websites_deploy/index.html dist/index.html

          # Alle 13 Projekte einfügen
          for proj in haustechnik-hun heizung-sanitaer-adamek shk-rathmann \
                      susanneheitmann fahrschulekolb yoga-kendra sehrfit \
                      fahrschule-salman fat-daddys-tattoo fahrschule-frank-dopf \
                      christ-berlin swa-berlin goldschmiede-cifci; do
            src="artifacts/dist-${proj}"
            if [ -d "$src" ] && [ -f "${src}/index.html" ]; then
              mkdir -p "dist/${proj}"
              cp -r "${src}/." "dist/${proj}/"
              echo "✅ ${proj}"
            else
              echo "⚠️  ${proj} – kein Artifact"
            fi
          done


          echo ""
          echo "Gesamt: $(find dist -name 'index.html' | wc -l) Seiten"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
