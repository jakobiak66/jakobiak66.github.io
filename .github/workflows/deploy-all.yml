name: Deploy All 13 Websites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # PHASE 1: Alle 13 Websites parallel bauen
  # ─────────────────────────────────────────────
  build:
    name: "Build: ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: haustechnik-hun,         path: fertig/haustechnik-hun/website }
          - { project: heizung-sanitaer-adamek, path: fertig/heizung-sanitaer-adamek/website }
          - { project: shk-rathmann,            path: fertig/shk-rathmann/website }
          - { project: susanneheitmann,         path: fertig/susanneheitmann/website }
          - { project: fahrschulekolb,          path: fertig/fahrschulekolb/website }
          - { project: yoga-kendra,             path: fertig/yoga-kendra/website }
          - { project: sehrfit,                 path: fertig/sehrfit/website }
          - { project: fahrschule-salman,       path: fertig/fahrschule-salman/website }
          - { project: fat-daddys-tattoo,       path: fertig/fat-daddys-tattoo/website }
          - { project: fahrschule-frank-dopf,   path: fertig/fahrschule-frank-dopf/website }
          - { project: christ-berlin,           path: fertig/christ-berlin/website }
          - { project: swa-berlin,              path: fertig/swa-berlin/website }
          - { project: goldschmiede-cifci,      path: fertig/goldschmiede-cifci/website }

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install
        working-directory: ${{ matrix.path }}

      # FIX 1: Base-Pfad in vite.config.ts setzen (nicht via CLI-Flag)
      # Der Lovable-Config-Wrapper liest base NUR über defineConfig({ vite: { base } })
      - name: Set base path in vite.config.ts
        run: |
          cat > vite.config.ts << EOF
          import { defineConfig } from "@lovable.dev/vite-tanstack-config";
          export default defineConfig({ vite: { base: "/${{ matrix.project }}/" } });
          EOF
        working-directory: ${{ matrix.path }}

      - name: Build Website
        run: npm run build
        working-directory: ${{ matrix.path }}
        env:
          NODE_ENV: production

      # FIX 2: TanStack Start baut nach dist/client/ statt dist/
      # Normalize: alles immer nach dist/index.html
      - name: Normalize build output
        run: |
          # TanStack SSR/Cloudflare baut nach dist/client/index.html
          if [ -f "dist/client/index.html" ]; then
            echo "TanStack SSR erkannt → dist/client/ → dist/ verschieben"
            mv dist/client dist_static_tmp
            rm -rf dist
            mv dist_static_tmp dist
          fi

          # Ergebnis prüfen
          if [ -f "dist/index.html" ]; then
            echo "✅ dist/index.html vorhanden ($(find dist -type f | wc -l) Dateien)"
          else
            echo "❌ Kein dist/index.html gefunden"
            ls -la dist/ 2>/dev/null || echo "dist/ existiert nicht"
            exit 1
          fi
        working-directory: ${{ matrix.path }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.project }}
          path: ${{ matrix.path }}/dist
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────
  # PHASE 2: Alle Builds zusammenführen & deployen
  # ─────────────────────────────────────────────
  assemble-and-deploy:
    name: "Assemble & Deploy to GitHub Pages"
    needs: build
    # FIX 3: Immer ausführen, auch wenn einzelne Build-Jobs scheitern
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download All Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble Final Output
        run: |
          mkdir -p dist
          cp fertig/alle_websites_deploy/index.html dist/index.html

          PROJECTS=(
            haustechnik-hun
            heizung-sanitaer-adamek
            shk-rathmann
            susanneheitmann
            fahrschulekolb
            yoga-kendra
            sehrfit
            fahrschule-salman
            fat-daddys-tattoo
            fahrschule-frank-dopf
            christ-berlin
            swa-berlin
            goldschmiede-cifci
          )

          ok=0; skip=0
          for proj in "${PROJECTS[@]}"; do
            artifact_dir="artifacts/dist-${proj}"
            if [ -d "$artifact_dir" ] && [ -f "${artifact_dir}/index.html" ]; then
              mkdir -p "dist/${proj}"
              cp -r "${artifact_dir}/." "dist/${proj}/"
              echo "✅ Assembled: ${proj}"
              ok=$((ok+1))
            else
              echo "⚠️  Skipped: ${proj}"
              skip=$((skip+1))
            fi
          done

          echo ""
          echo "Ergebnis: ${ok} assembliert, ${skip} übersprungen"
          echo "Dateien in dist/: $(find dist -type f | wc -l)"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
