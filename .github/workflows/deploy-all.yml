name: Deploy All 13 Websites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────
  # 10 Standard Vite+React Websites parallel bauen
  # (christ-berlin, swa-berlin, goldschmiede-cifci
  #  benötigen Cloudflare/SSR und werden separat
  #  als Placeholder eingebunden)
  # ─────────────────────────────────────────────
  build:
    name: "Build: ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: haustechnik-hun,         path: fertig/haustechnik-hun/website }
          - { project: heizung-sanitaer-adamek, path: fertig/heizung-sanitaer-adamek/website }
          - { project: shk-rathmann,            path: fertig/shk-rathmann/website }
          - { project: susanneheitmann,         path: fertig/susanneheitmann/website }
          - { project: fahrschulekolb,          path: fertig/fahrschulekolb/website }
          - { project: yoga-kendra,             path: fertig/yoga-kendra/website }
          - { project: sehrfit,                 path: fertig/sehrfit/website }
          - { project: fahrschule-salman,       path: fertig/fahrschule-salman/website }
          - { project: fat-daddys-tattoo,       path: fertig/fat-daddys-tattoo/website }
          - { project: fahrschule-frank-dopf,   path: fertig/fahrschule-frank-dopf/website }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install
        working-directory: ${{ matrix.path }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.path }}

      - name: Verify dist/index.html
        run: |
          if [ -f "dist/index.html" ]; then
            echo "✅ Build OK – $(find dist -type f | wc -l) Dateien"
          else
            echo "❌ dist/index.html fehlt!"
            ls -la dist/ 2>/dev/null || echo "dist/ existiert nicht"
            exit 1
          fi
        working-directory: ${{ matrix.path }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.project }}
          path: ${{ matrix.path }}/dist
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────
  # Alles zusammenführen und auf GitHub Pages deployen
  # ─────────────────────────────────────────────
  assemble-and-deploy:
    name: "Assemble & Deploy"
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble dist/
        run: |
          mkdir -p dist
          cp fertig/alle_websites_deploy/index.html dist/index.html

          # 10 React-Projekte einfügen
          for proj in haustechnik-hun heizung-sanitaer-adamek shk-rathmann \
                      susanneheitmann fahrschulekolb yoga-kendra sehrfit \
                      fahrschule-salman fat-daddys-tattoo fahrschule-frank-dopf; do
            src="artifacts/dist-${proj}"
            if [ -d "$src" ] && [ -f "${src}/index.html" ]; then
              mkdir -p "dist/${proj}"
              cp -r "${src}/." "dist/${proj}/"
              echo "✅ ${proj}"
            else
              echo "⚠️  ${proj} – kein Artifact"
            fi
          done

          # 3 TanStack/Cloudflare Projekte als Placeholder
          # (benötigen Cloudflare Workers, nicht kompatibel mit GitHub Pages)
          for proj_info in \
            "christ-berlin|Alexander Christ GmbH|Gebäudetechnik · Berlin" \
            "swa-berlin|SWA Berlin GmbH|TGA-Haustechnik · Berlin" \
            "goldschmiede-cifci|Goldschmiede Cifci|Goldschmiedekunst · Karlsruhe"; do
            proj="${proj_info%%|*}"
            rest="${proj_info#*|}"
            firma="${rest%%|*}"
            sub="${rest#*|}"
            mkdir -p "dist/${proj}"
            cat > "dist/${proj}/index.html" <<HTML
          <!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1">
          <title>${firma}</title>
          <style>
            *{box-sizing:border-box;margin:0;padding:0}
            body{font-family:system-ui,sans-serif;background:#0a0a0f;color:#e2e2f0;
                 display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
            .c{max-width:480px;padding:2rem}
            .tag{display:inline-block;background:#6366f133;border:1px solid #6366f1;
                 color:#6366f1;padding:.3rem .8rem;border-radius:999px;font-size:.75rem;margin-bottom:1.5rem}
            h1{font-size:1.75rem;font-weight:800;margin:.5rem 0}
            p{color:#666;margin:1rem 0 2rem;font-size:.9rem;line-height:1.5}
            a{display:inline-block;background:#6366f1;color:#fff;padding:.75rem 1.5rem;
               border-radius:.5rem;text-decoration:none;font-weight:600}
          </style></head>
          <body><div class="c">
            <div class="tag">Website</div>
            <h1>${firma}</h1>
            <p>${sub}<br><br>Diese Website nutzt serverseitiges Rendering<br>und wird separat gehostet.</p>
            <a href="/">← Zur Übersicht</a>
          </div></body></html>
          HTML
            echo "📄 Placeholder: ${proj}"
          done

          echo ""
          echo "Gesamt: $(find dist -name 'index.html' | wc -l) Seiten"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
